# CLA enforcement for Q-Summit/q-app.
#
# How it works: on their first pull request, a contributor is asked by the bot
# to comment the sign phrase. The bot records them in cla/signatures.json on the
# main branch and turns the PR check green. Later PRs pass automatically.
# EVERYONE signs, including maintainers. No human is ever exempt.
#
# About the CLA write bypass (read this, it is not a loophole):
#   Signatures are stored on main, so the record is durable and versioned with
#   the code. Because main requires pull requests, the CLA writer needs
#   permission to commit the signatures file to main directly. Org policy
#   blocks github-actions[bot] as a ruleset bypass, so we use the dedicated
#   q-app-cla GitHub App instead. That App may push the signature ledger. It
#   does NOT let anyone skip signing: every human is still gated by the
#   required "CLA Assistant" check on every pull request.
#
# There are two separate lists; do not confuse them:
#   - CLA allowlist (below): who may skip SIGNING. Bots only. No human, ever.
#   - Branch bypass: q-app-cla (always, for ledger writes). A lead may also
#     have pull_request bypass to merge without waiting for review; that is
#     unrelated to CLA signing.
#
# Comment policy (scripts/cla-comment-policy.mjs): stay silent when everyone
# has already signed; when someone is missing, @-mention them. Upstream CLA
# Assistant always rewrites an "all signed" comment, so we delete that on
# success. No in-progress or celebration comments.
#
# Secrets (Repository Settings > Secrets and variables > Actions):
#   - CLA_APP_ID: numeric App ID of q-app-cla
#   - CLA_APP_PRIVATE_KEY: contents of the App's .pem private key
#
# REQUIRED one-time GitHub settings (Repository Settings):
#   1. Actions > General > Workflow permissions: keep the default at "Read
#      repository contents and packages permissions" (read-only). This workflow
#      mints its own App token below for writes; other workflows stay least
#      privilege unless they opt into more on purpose.
#   2. Rules > ruleset for main:
#        - Require a pull request before merging.
#        - Require status checks to pass, and add the "CLA Assistant" check
#          (this is what blocks merging an unsigned PR).
#        - Bypass list: q-app-cla (Always allow) for ledger writes. Optional:
#          lead user with "pull requests only" to self-merge. No blanket Admin.
#        - Do NOT enable "Require signed commits" (the bot's commits are unsigned
#          and would be rejected).
#   3. Any push-triggered workflow on main should set paths-ignore: ['cla/**']
#      so recording a signature never triggers a build.
#   4. Never edit cla/signatures.json in a human PR (prettier-ignored; checks.yml
#      fails the PR if the file appears in the diff). Only q-app-cla writes it.

name: CLA Assistant

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, synchronize]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

# Serialize signature-ledger writes. Two quick sign/recheck comments could
# otherwise race two commits to cla/signatures.json on main and conflict or lose
# an update. Never cancel-in-progress here: a half-finished ledger write must
# complete, not be interrupted.
concurrency:
  group: cla-signatures
  cancel-in-progress: false

jobs:
  cla:
    runs-on: ubuntu-latest
    steps:
      # Mint an installation token for q-app-cla so signature commits on main
      # bypass the required-PR ruleset. Update SHA + version comment together.
      - name: Create q-app-cla token
        id: app-token
        if: >-
          (github.event_name == 'issue_comment' &&
            (github.event.comment.body == 'recheck' ||
             github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA')) ||
          github.event_name == 'pull_request_target'
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.CLA_APP_ID }}
          private-key: ${{ secrets.CLA_APP_PRIVATE_KEY }}
          # Narrow below the App's installation defaults (zizmor github-app-token).
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}
          permission-contents: write
          permission-pull-requests: write
          permission-statuses: write
          permission-metadata: read

      - name: CLA Assistant
        id: cla
        continue-on-error: true
        if: >-
          (github.event_name == 'issue_comment' &&
            (github.event.comment.body == 'recheck' ||
             github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA')) ||
          github.event_name == 'pull_request_target'
        # Pinned to a full commit SHA rather than a mutable tag because this
        # job runs with contents:write in a pull_request_target context. Update
        # the SHA and the trailing comment together when bumping versions.
        # Maintained fork of the archived contributor-assistant/github-action.
        uses: badideasforsale/cla-github-action@38936d31c921b8e536f5b786ea57c537b7cf297c # main
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        with:
          # App token commits signatures to protected main (q-app-cla bypass).
          personal-access-token: ${{ steps.app-token.outputs.token }}
          path-to-signatures: "cla/signatures.json"
          branch: "main"
          path-to-document: "https://github.com/Q-Summit/q-app/blob/main/CLA.md"
          # Who may skip SIGNING: only automated bot accounts. `*[bot]` matches
          # every GitHub App account (brackets are illegal in human usernames).
          allowlist: "*[bot]"
          # Intro only; scripts/cla-comment-policy.mjs rewrites with @-mentions.
          custom-notsigned-prcomment: |
            Before we can merge, every human committer must sign our
            [Contributor License Agreement (CLA)]($pathToDocument).
            You keep the copyright; signing lets Q-Summit keep the app free for
            non-profits while offering commercial licenses. One-time step.

            **Reply with exactly:**
          custom-pr-sign-comment: "I have read the CLA Document and I hereby sign the CLA"
          # Upstream always posts an "all signed" update; policy script deletes it.
          custom-allsigned-prcomment: "."
          lock-pullrequest-aftermerge: false

      # pull_request_target must not run PR-head code. Check out the default
      # branch only so we run the trusted policy script from main.
      - name: Checkout CLA comment policy
        if: always() && steps.cla.outcome != 'skipped'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.repository.default_branch }}
          # Directory (not a single file): cone-mode sparse-checkout is reliable.
          sparse-checkout: scripts
          persist-credentials: false

      - name: CLA comment policy
        if: always() && steps.cla.outcome != 'skipped'
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          CLA_OUTCOME: ${{ steps.cla.outcome }}
          PR_NUMBER: ${{ github.event.pull_request.number || github.event.issue.number }}
          PATH_TO_DOCUMENT: https://github.com/Q-Summit/q-app/blob/main/CLA.md
          SIGN_PHRASE: I have read the CLA Document and I hereby sign the CLA
          # Must match pullRequestCommentContent.commentMarker for this workflow/job.
          COMMENT_MARKER: "<!-- cla-lite-bot:cla:CLA Assistant:cla -->"
        run: |
          if [ ! -f scripts/cla-comment-policy.mjs ]; then
            echo "policy script not on default branch yet; skipping"
            exit 0
          fi
          node scripts/cla-comment-policy.mjs

      - name: CLA must pass
        if: steps.cla.outcome == 'failure'
        run: |
          echo "::error::CLA signature missing: see the bot comment for who must sign."
          exit 1
