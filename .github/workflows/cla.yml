# CLA enforcement for Q-Summit/q-app.
#
# How it works: on their first pull request, a contributor is asked by the bot
# to comment the sign phrase. The bot records them in cla/signatures.json on the
# main branch and turns the PR check green. Later PRs pass automatically.
# EVERYONE signs, including maintainers. No human is ever exempt.
#
# About the ONE bypass entry (read this, it is not a loophole):
#   Signatures are stored on main, so the record is durable and versioned with
#   the code. Because main requires pull requests, the CLA writer needs
#   permission to commit the signatures file to main directly. Org policy
#   blocks github-actions[bot] as a ruleset bypass, so we use the dedicated
#   q-app-cla GitHub App instead. That App is the ONLY entry on main's bypass
#   list. It lets the BOT write the signature ledger. It does NOT let any human
#   merge without a PR, and it does NOT let anyone skip signing: every human is
#   still gated by the required "CLA Assistant" check on every pull request.
#
# There are two separate lists; do not confuse them:
#   - CLA allowlist (below): who may skip SIGNING. Bots only. No human, ever.
#   - Branch bypass: who may push to main without a PR. Only q-app-cla.
#
# Secrets (Repository Settings > Secrets and variables > Actions):
#   - CLA_APP_ID: numeric App ID of q-app-cla
#   - CLA_APP_PRIVATE_KEY: contents of the App's .pem private key
#
# REQUIRED one-time GitHub settings (Repository Settings):
#   1. Actions > General > Workflow permissions: keep the default at "Read
#      repository contents and packages permissions" (read-only). This workflow
#      mints its own App token below for writes; other workflows stay least
#      privilege unless they opt into more on purpose.
#   2. Rules > ruleset for main:
#        - Require a pull request before merging.
#        - Require status checks to pass, and add the "CLA Assistant" check
#          (this is what blocks merging an unsigned PR).
#        - Bypass list: add ONLY q-app-cla (Always allow). No human / no Admin.
#        - Do NOT enable "Require signed commits" (the bot's commits are unsigned
#          and would be rejected).
#   3. Any push-triggered workflow on main should set paths-ignore: ['cla/**']
#      so recording a signature never triggers a build.
#   4. Never edit cla/signatures.json in a human PR (prettier-ignored; checks.yml
#      fails the PR if the file appears in the diff). Only q-app-cla writes it.
#   5. Comment policy (enforced by the "CLA comment policy" step below): stay
#      silent when everyone has already signed; when someone is missing, ping
#      them with @login. The upstream action always rewrites an "all signed"
#      comment, so we delete that chatter on success.

name: CLA Assistant

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, synchronize]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

# Serialize signature-ledger writes. Two quick sign/recheck comments could
# otherwise race two commits to cla/signatures.json on main and conflict or lose
# an update. Never cancel-in-progress here: a half-finished ledger write must
# complete, not be interrupted.
concurrency:
  group: cla-signatures
  cancel-in-progress: false

jobs:
  cla:
    runs-on: ubuntu-latest
    steps:
      # Mint an installation token for q-app-cla so signature commits on main
      # bypass the required-PR ruleset. Update SHA + version comment together.
      - name: Create q-app-cla token
        id: app-token
        if: >-
          (github.event_name == 'issue_comment' &&
            (github.event.comment.body == 'recheck' ||
             github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA')) ||
          github.event_name == 'pull_request_target'
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.CLA_APP_ID }}
          private-key: ${{ secrets.CLA_APP_PRIVATE_KEY }}
          # Narrow below the App's installation defaults (zizmor github-app-token).
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}
          permission-contents: write
          permission-pull-requests: write
          permission-statuses: write
          permission-metadata: read

      - name: CLA Assistant
        id: cla
        continue-on-error: true
        if: >-
          (github.event_name == 'issue_comment' &&
            (github.event.comment.body == 'recheck' ||
             github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA')) ||
          github.event_name == 'pull_request_target'
        # Pinned to a full commit SHA rather than a mutable tag because this
        # job runs with contents:write in a pull_request_target context. Update
        # the SHA and the trailing comment together when bumping versions.
        # Maintained fork of the archived contributor-assistant/github-action.
        uses: badideasforsale/cla-github-action@38936d31c921b8e536f5b786ea57c537b7cf297c # main
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        with:
          # App token commits signatures to protected main (q-app-cla bypass).
          personal-access-token: ${{ steps.app-token.outputs.token }}
          # Signatures are stored on the main branch, in cla/signatures.json, so
          # the record is durable and versioned with the code and cannot be lost
          # by deleting a branch. Seeded once; the App appends signers. See the
          # header for the one App bypass this needs.
          # path-to-signatures and branch are set explicitly (v3 defaults differ).
          path-to-signatures: "cla/signatures.json"
          branch: "main"
          # The document contributors agree to.
          path-to-document: "https://github.com/Q-Summit/q-app/blob/main/CLA.md"
          # Who may skip SIGNING: only automated bot accounts, which cannot post
          # the signing comment. `*[bot]` matches every GitHub App account
          # (brackets are illegal in human usernames). Never add a human here, so
          # every maintainer and contributor signs.
          allowlist: "*[bot]"
          # Intro only: the "CLA comment policy" step rewrites the body so
          # missing signers are always @-mentioned (upstream only lists them
          # when there are 2+ committers).
          custom-notsigned-prcomment: |
            Before we can merge, every human committer must sign our
            [Contributor License Agreement (CLA)]($pathToDocument).
            You keep the copyright; signing lets Q-Summit keep the app free for
            non-profits while offering commercial licenses. One-time step.

            **Reply with exactly:**
          custom-pr-sign-comment: "I have read the CLA Document and I hereby sign the CLA"
          # Upstream always posts an "all signed" update; we delete it below.
          custom-allsigned-prcomment: "."
          lock-pullrequest-aftermerge: false

      # Upstream CLA Assistant (a) skips creating a comment when everyone is
      # already signed, but (b) rewrites any prior bot comment into an "all
      # signed" celebration, and (c) only @-mentions unsigned committers when
      # there are 2+. Enforce our policy: silence on success; @ping on failure.
      - name: CLA comment policy
        if: always() && steps.cla.outcome != 'skipped'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          CLA_OUTCOME: ${{ steps.cla.outcome }}
          PR_NUMBER: ${{ github.event.pull_request.number || github.event.issue.number }}
          REPO: ${{ github.repository }}
          PATH_TO_DOCUMENT: https://github.com/Q-Summit/q-app/blob/main/CLA.md
          SIGN_PHRASE: I have read the CLA Document and I hereby sign the CLA
          # Must match pullRequestCommentContent.commentMarker for this workflow/job.
          COMMENT_MARKER: "<!-- cla-lite-bot:cla:CLA Assistant:cla -->"
        run: |
          python3 <<'PY'
          import base64, json, os, subprocess, sys, urllib.parse

          def gh_json(path: str):
              out = subprocess.check_output(
                  ["gh", "api", "--paginate", path], text=True
              )
              return json.loads(out)

          def gh_send(method, path, body=None):
              cmd = ["gh", "api", "-X", method, path]
              if body is not None:
                  cmd.extend(["--input", "-"])
                  subprocess.check_call(
                      cmd, input=json.dumps(body), text=True
                  )
              else:
                  subprocess.check_call(cmd)

          repo = os.environ["REPO"]
          pr = os.environ["PR_NUMBER"]
          outcome = os.environ["CLA_OUTCOME"]
          marker = os.environ["COMMENT_MARKER"]
          doc = os.environ["PATH_TO_DOCUMENT"]
          phrase = os.environ["SIGN_PHRASE"]

          comments = gh_json(f"repos/{repo}/issues/{pr}/comments")
          ours = [
              c
              for c in comments
              if isinstance(c.get("body"), str)
              and (
                  marker in c["body"]
                  or "Self-Hosted CLA Assistant bot" in c["body"]
              )
          ]

          if outcome == "success":
              for c in ours:
                  gh_send("DELETE", f"repos/{repo}/issues/comments/{c['id']}")
              print(f"removed {len(ours)} all-signed CLA comment(s)")
              sys.exit(0)

          commits = gh_json(f"repos/{repo}/pulls/{pr}/commits")
          logins: list[str] = []
          seen: set[str] = set()
          for commit in commits:
              login = (commit.get("author") or {}).get("login")
              if not login or login.endswith("[bot]") or login in seen:
                  continue
              seen.add(login)
              logins.append(login)

          sig_meta = gh_json(
              f"repos/{repo}/contents/cla/signatures.json?ref=main"
          )
          sig = json.loads(base64.b64decode(sig_meta["content"]))
          signed_ids = {
              entry.get("id") for entry in sig.get("signedContributors", [])
          }
          signed_names = {
              entry.get("name")
              for entry in sig.get("signedContributors", [])
              if entry.get("name")
          }

          unsigned: list[str] = []
          for login in logins:
              user = gh_json(f"users/{urllib.parse.quote(login)}")
              if user["id"] in signed_ids or login in signed_names:
                  continue
              unsigned.append(login)

          if not unsigned:
              print("CLA failed without resolvable unsigned humans; leaving comments")
              sys.exit(0)

          mentions = " ".join(f"@{login}" for login in unsigned)
          body = "\n".join(
              [
                  f"{mentions}: please sign the CLA before this can merge.",
                  "",
                  "Before we can merge, every human committer must sign our",
                  f"[Contributor License Agreement (CLA)]({doc}).",
                  "You keep the copyright; signing lets Q-Summit keep the app free for",
                  "non-profits while offering commercial licenses. One-time step.",
                  "",
                  "**Reply with exactly:**",
                  "- - -",
                  phrase,
                  "- - -",
                  "<sub>You can retrigger this bot by commenting **recheck** in this Pull Request.</sub>",
                  "<sub>Posted by the **Self-Hosted CLA Assistant bot**.</sub>",
                  marker,
              ]
          )

          if ours:
              primary, *dupes = ours
              gh_send(
                  "PATCH",
                  f"repos/{repo}/issues/comments/{primary['id']}",
                  {"body": body},
              )
              for c in dupes:
                  gh_send("DELETE", f"repos/{repo}/issues/comments/{c['id']}")
              print(f"updated CLA ping for: {', '.join(unsigned)}")
          else:
              gh_send(
                  "POST",
                  f"repos/{repo}/issues/{pr}/comments",
                  {"body": body},
              )
              print(f"created CLA ping for: {', '.join(unsigned)}")
          PY

      - name: CLA must pass
        if: steps.cla.outcome == 'failure'
        run: |
          echo "::error::CLA signature missing: see the bot comment for who must sign."
          exit 1
